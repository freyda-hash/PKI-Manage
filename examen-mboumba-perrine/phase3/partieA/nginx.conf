server {
    listen 443 ssl;
    server_name portal.cargo.skytrust.local;

    ssl_certificate     /etc/nginx/fullchain.pem;
    ssl_certificate_key /etc/nginx/key.pem;

    ssl_client_certificate /etc/nginx/trusted-client-cas.pem;
    ssl_verify_client on;
    ssl_verify_depth 2;

    ssl_protocols TLSv1.2 TLSv1.3;

    location / {
        default_type application/json;

        add_header X-Client-DN $ssl_client_s_dn always;
        add_header X-Client-Verify $ssl_client_verify always;

        return 200 '{"status":"ok","service":"SkyTrust Cargo Portal","client":"$ssl_client_s_dn","verified":"$ssl_client_verify"}';
    }
}